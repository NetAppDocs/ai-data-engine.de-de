indexpage:
  title: AI Data Engine Dokumentation
  summary: Die AI Data Engine Dokumentation bietet umfassende Informationen zur Installation,
    Konfiguration und Verwaltung von AIDE-Systemen, einschließlich Katalogisierung
    von Metadaten, Workspace-Management, Datensammlungen und Integration mit KI/ML-Workflows.
  keywords: aide, ai data engine, ontap, metadata engine, workspaces, data collections,
    vector database, guardrails, dcn, data compute nodes
  lead: NetApp AI Data Engine (AIDE) ist eine Plattform der Enterprise-Klasse, die
    entwickelt wurde, um KI-gestützte Datenverarbeitung, -verwaltung und -governance
    zu beschleunigen und zu vereinfachen. AIDE verwandelt unstrukturierte Daten in
    strukturierte, KI-bereite Datensätze für maschinelles Lernen und generative KI-Workloads.
